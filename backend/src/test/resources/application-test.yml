spring:
  application:
    name: doutor-trabalho-backend-test

  # Disable AI services in unit tests
  ai:
    anthropic:
      api-key: test-key
      chat:
        options:
          model: claude-sonnet-4-6
          temperature: 0.3
          max-tokens: 4096
    openai:
      api-key: test-key
      chat:
        enabled: false
      embedding:
        options:
          model: text-embedding-3-small
    vectorstore:
      pgvector:
        dimensions: 1536
        initialize-schema: true

  # H2 for unit tests (Testcontainers for integration)
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Disable Redis in tests
  data:
    redis:
      host: localhost
      port: 6379

app:
  base-url: http://localhost:8080
  cors:
    allowed-origins: http://localhost:3000
  jwt:
    secret: test-jwt-secret-key-minimum-256-bits-long-for-testing!!
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 604800000
  legal-qa:
    max-history-messages: 5
    rag:
      top-k: 5
      similarity-threshold: 0.5
    rate-limit:
      free-tier-per-hour: 100

logging:
  level:
    pt.doutortrabalho: DEBUG
