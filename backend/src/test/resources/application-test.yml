spring:
  application:
    name: doutor-trabalho-backend-test

  # Disable AI services in unit tests
  ai:
    anthropic:
      api-key: test-key
      chat:
        options:
          model: claude-sonnet-4-6
    openai:
      api-key: test-key
    vectorstore:
      pgvector:
        dimensions: 1536
        initialize-schema: true

  # H2 for unit tests (Testcontainers for integration)
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Disable Redis in tests
  data:
    redis:
      host: localhost
      port: 6379

  # Disable OAuth2 in tests
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/test

app:
  base-url: http://localhost:8080
  cors:
    allowed-origins: http://localhost:3000
  legal-qa:
    max-history-messages: 5
    rag:
      top-k: 5
      similarity-threshold: 0.5
    rate-limit:
      free-tier-per-hour: 100

logging:
  level:
    pt.doutortrabalho: DEBUG
